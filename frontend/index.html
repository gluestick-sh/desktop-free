<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/appicon.png" />
    <title>Gluestick Desktop</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
    </style>
    <script>
      (function () {
        var stored = localStorage.getItem('gluestick-desktop-theme') || 'dark';
        var presets = {
          dark: '#1a1a2e',
          light: '#f1f5f9',
          midnight: '#0d1117',
          forest: '#0f1a14',
          dracula: '#282a36',
          nord: '#2e3440',
          rose: '#fff1f2',
          solarized: '#002b36',
          'high-contrast': '#000000',
          retro: '#0a0f0a'
        };
        var bg = presets[stored] || presets.dark;
        document.documentElement.style.background = bg;
        document.documentElement.style.colorScheme = stored === 'light' || stored === 'rose' ? 'light' : 'dark';
        document.documentElement.dataset.theme = stored.indexOf('custom:') === 0
          ? 'custom'
          : (presets[stored] ? stored : 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
